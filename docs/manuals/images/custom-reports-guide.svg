  <text x="902" y="604" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#58717d">participant-level journey rows</text>
  <text x="902" y="632" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#58717d">and export a selected-event CSV.</text>
