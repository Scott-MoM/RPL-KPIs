  <text x="466" y="604" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#58717d">Average, median, max distance</text>
  <text x="466" y="632" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#58717d">Distance bands</text>
